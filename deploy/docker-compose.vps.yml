services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: epoxiron
      POSTGRES_USER: epoxiron
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epoxiron -d epoxiron"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - epoxiron_net

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../api/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /usr/bin/rclone:/usr/bin/rclone:ro
      - /root/.hermes/rclone.conf:/root/.hermes/rclone.conf:ro
    networks:
      - epoxiron_net

  hermes:
    image: epoxiron-hermes:latest
    container_name: hermes-gateway
    restart: unless-stopped
    command: ["/usr/local/bin/hermes", "gateway", "run"]
    env_file:
      - path: ./hermes/hermes.env
        required: false
    depends_on:
      - api
    volumes:
      - /root/.hermes:/root/.hermes
    networks:
      - epoxiron_net

volumes:
  postgres_data:

networks:
  epoxiron_net:
    driver: bridge
